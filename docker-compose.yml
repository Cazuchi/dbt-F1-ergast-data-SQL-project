services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_DB: f1_dbt_db
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./F1-Ergast-data-files:/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_dbt_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.latest
    volumes:
      - ./f1_dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    entrypoint: ["sh", "-c", "dbt run --profiles-dir /usr/app/dbt && dbt test --profiles-dir /usr/app/dbt"]
    depends_on:
      postgres:
        condition: service_healthy